<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Reports</title>
    <style>
        :root {
            --bg-1: #f4fbf8;
            --bg-2: #ecf1ff;
            --card: #ffffff;
            --text: #17202a;
            --muted: #5f6a72;
            --accent: #0b8f6f;
            --accent-2: #2455d6;
            --shadow: 0 10px 25px rgba(20, 30, 50, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 20%, rgba(11, 143, 111, 0.18), transparent 30%),
                radial-gradient(circle at 85% 0%, rgba(36, 85, 214, 0.16), transparent 34%),
                linear-gradient(160deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(920px, 100%);
        }

        .panel {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 32px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.8rem, 2.2vw, 2.5rem);
            letter-spacing: 0.3px;
        }

        .today {
            margin-top: 8px;
            color: var(--muted);
            font-size: 1rem;
        }

        .days-grid {
            margin-top: 24px;
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        }

        .day-link {
            text-decoration: none;
            color: inherit;
        }

        .day-card {
            background: var(--card);
            border: 1px solid #dce4f3;
            border-radius: var(--radius);
            padding: 18px;
            display: grid;
            gap: 6px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .day-link:hover .day-card,
        .day-link:focus-visible .day-card {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(20, 30, 50, 0.12);
            border-color: #b9c8ea;
        }

        .day-name {
            font-size: 1.05rem;
            font-weight: 650;
            text-transform: capitalize;
        }

        .day-path {
            font-size: 0.92rem;
            color: var(--muted);
        }

        .hint {
            margin-top: 24px;
            color: var(--muted);
            font-size: 0.92rem;
            border-top: 1px dashed #d6deee;
            padding-top: 14px;
        }

        @media (max-width: 600px) {
            .panel {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="panel" aria-label="Daily report navigation">
            <h1>Daily Report Pages</h1>
            <p class="today" id="todayDate">Today: </p>

            <div class="days-grid" id="daysGrid"></div>
        </section>
    </main>

    <script>
        const dayFolders = ["may5", "may6"];

        const formatter = new Intl.DateTimeFormat("en-US", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric"
        });
        document.getElementById("todayDate").textContent = `Today: ${formatter.format(new Date())}`;

        const daysGrid = document.getElementById("daysGrid");

        dayFolders.forEach((folder) => {
            const link = document.createElement("a");
            link.href = `${folder}/index.html`;
            link.className = "day-link";

            link.innerHTML = `
                <article class="day-card">
                    <span class="day-name">${folder}</span>
                    <span class="day-path">Open ${folder}/index.html</span>
                </article>
            `;

            daysGrid.appendChild(link);
        });
    </script>
</body>
</html>
